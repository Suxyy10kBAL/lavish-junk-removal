<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fafafa; }
  .card { background: #fff; border-radius: 16px; padding: 24px 28px; display:flex; flex-direction:column; gap:14px; }
  .row { display:flex; align-items:baseline; gap:18px; border-bottom:1px solid #f1f1f1; padding-bottom:12px; }
  .row:last-child { border-bottom:0; padding-bottom:0; }
  .label { width:90px; color:#888; font-size:11px; font-family:ui-monospace,Menlo,monospace; flex-shrink:0; }
  .h-display { font-family:"Playfair Display",serif; font-weight:800; font-size:32px; color:#18181b; }
  .h-section { font-family:"Playfair Display",serif; font-weight:700; font-size:26px; color:#18181b; }
  .h-card { font-family:Inter,sans-serif; font-weight:700; font-size:17px; color:#18181b; }
  .eyebrow { font-family:Inter,sans-serif; font-weight:700; font-size:11px; letter-spacing:.13em; text-transform:uppercase; color:#a98735; }
</style>
</head>
<body>
<div class="card">
  <div class="row"><div class="label">display</div><div class="h-display">Junk Removal Made Simple</div></div>
  <div class="row"><div class="label">section</div><div class="h-section">How It Works</div></div>
  <div class="row"><div class="label">card</div><div class="h-card">Same-Day Service</div></div>
  <div class="row"><div class="label">eyebrow</div><div class="eyebrow">Serving the Lower Mainland</div></div>
</div>
</body>
</html>
