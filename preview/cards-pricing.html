<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#c5a14a; --gold-deep:#a98735; --gold-light:#e0bf6f;
    --bg:#0f0f10; --bg-card:#16161a; --line:rgba(255,255,255,.08);
    --text:#f2f2f2; --muted:#8a8a96;
    --ease: cubic-bezier(.22,.61,.36,1);
  }
  * { box-sizing: border-box; }
  body { margin:0; padding:18px; background:var(--bg); color:var(--text);
    font-family:Inter,sans-serif; -webkit-font-smoothing:antialiased; }

  .calc {
    background: linear-gradient(180deg, #18181c 0%, #131316 100%);
    border:1px solid var(--line); border-radius:18px;
    padding:22px 24px 20px;
    display:grid; grid-template-columns: 1.05fr .95fr; gap:24px;
    position: relative; overflow: hidden;
  }
  .calc::before {
    content:""; position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(ellipse 70% 60% at 110% 0%, rgba(197,161,74,.10), transparent 60%);
  }

  /* ── LEFT: Truck visual ──────────────────────────── */
  .visual { position:relative; min-height: 360px;
    display:flex; flex-direction:column; gap:14px; }

  .visual-head { display:flex; justify-content:space-between; align-items:baseline; }
  .eyebrow { color:var(--gold); font-size:10px; font-weight:700;
    letter-spacing:.16em; text-transform:uppercase; }
  .live-pill {
    display:inline-flex; align-items:center; gap:6px;
    color:var(--gold); font-size:10px; font-weight:600; letter-spacing:.08em;
    text-transform:uppercase;
  }
  .live-pill::before { content:""; width:6px; height:6px; border-radius:50%;
    background:#74e088; box-shadow: 0 0 8px #74e088; animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.35 } }

  .truck-stage {
    position:relative; flex:1; min-height: 220px;
    border-radius:14px; padding: 14px;
    background:
      radial-gradient(ellipse 90% 50% at 50% 100%, rgba(197,161,74,.12), transparent 65%),
      linear-gradient(180deg, #0e0e11 0%, #0a0a0c 100%);
    border:1px solid rgba(197,161,74,.18);
    overflow:hidden;
  }
  .truck-stage::after {
    /* faint horizon line */
    content:""; position:absolute; left:6%; right:6%; bottom:38px; height:1px;
    background: linear-gradient(90deg, transparent, rgba(197,161,74,.35), transparent);
  }

  .truck {
    position:absolute; left:50%; bottom:18px; transform: translateX(-50%);
    width: 92%; max-width: 380px; aspect-ratio: 380 / 200;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,.6));
  }
  /* Truck bed mask — matches the angled tipper polygon */
  .bed-clip {
    position:absolute;
    left: 5.8%; top: 14%;
    width: 60.5%; height: 56%;
    overflow:hidden;
    pointer-events:none;
  }
  .junk-pile {
    position:absolute; left:0; right:0; bottom:0;
    height: 0%;
    transition: height .9s var(--ease);
    background:
      /* furniture silhouettes — repeating box-shadow trick wouldn't tile, use layered gradients */
      linear-gradient(180deg, transparent 0%, transparent 18%, rgba(0,0,0,.25) 18.5%, transparent 19%),
      radial-gradient(ellipse 12% 18% at 14% 25%, var(--gold-light) 60%, transparent 62%),
      radial-gradient(ellipse 10% 14% at 36% 12%, var(--gold)       60%, transparent 62%),
      radial-gradient(ellipse 14% 20% at 60% 28%, var(--gold-deep)  60%, transparent 62%),
      radial-gradient(ellipse 11% 16% at 84% 18%, var(--gold-light) 60%, transparent 62%),
      linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 22%, var(--gold-deep) 65%, #6b5320 100%);
    clip-path: polygon(
      0% 100%,
      0% 0%,
      10% 7%,   22% 0%,
      34% 9%,   46% 0%,   58% 8%,
      70% 0%,   82% 10%,  94% 2%,
      100% 0%,
      100% 100%
    );
    opacity:.95;
  }
  /* tiny floating boxes that lift in when load grows */
  .float-box {
    position:absolute; width:14px; height:11px; border-radius:2px;
    background: linear-gradient(135deg, var(--gold), var(--gold-deep));
    box-shadow: 0 4px 8px rgba(0,0,0,.35);
    opacity:0; transform: translateY(8px);
    transition: opacity .35s ease, transform .55s var(--ease);
  }

  /* Slider */
  .ticks {
    display:grid; grid-template-columns: repeat(5, 1fr); gap:6px;
    margin-top: 4px;
  }
  .tick {
    appearance:none; -webkit-appearance:none; border:none;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    color: var(--muted);
    font-family: inherit; font-size: 10.5px; font-weight: 600;
    letter-spacing: .04em;
    padding: 9px 4px; border-radius: 8px;
    cursor: pointer;
    transition: background .25s ease, color .25s ease, border-color .25s ease, transform .2s ease;
  }
  .tick small { display:block; font-weight:500; opacity:.6; margin-top:1px; font-size:9.5px; }
  .tick:hover { color: #fff; border-color: rgba(197,161,74,.3); }
  .tick.active {
    color:#141410; background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-color: var(--gold);
    box-shadow: 0 6px 16px rgba(197,161,74,.32);
  }
  .tick.active small { opacity:.7; color: #2c2410; }

  /* ── RIGHT: Price + items ─────────────────────────── */
  .panel { display:flex; flex-direction:column; gap:14px; position:relative; }

  .price-block {
    background: rgba(255,255,255,.025);
    border: 1px solid rgba(197,161,74,.2);
    border-radius: 14px;
    padding: 14px 16px 16px;
  }
  .tier-name {
    font-family:"Playfair Display",serif; font-size: 22px; font-weight:700;
    color:#fff; margin: 2px 0 0;
    transition: color .3s ease;
  }
  .tier-for { color: var(--muted); font-size: 12px; margin: 4px 0 10px; }

  .price-row { display:flex; align-items:baseline; gap:10px; }
  .price {
    font-family:"Playfair Display",serif; font-weight:800;
    font-size: 36px; color: var(--gold); line-height:1;
    font-variant-numeric: tabular-nums;
    display:inline-flex; align-items:baseline;
  }
  .price .currency { font-size: 20px; margin-right: 2px; opacity:.85; }
  .price .digits {
    display:inline-block; position: relative;
    transition: opacity .25s ease, transform .35s var(--ease), filter .25s ease;
  }
  .price .digits.swap {
    opacity: 0; transform: translateY(-6px); filter: blur(2px);
  }
  .price-suffix { color: var(--muted); font-size:11px; font-weight:500; }

  /* Item chips */
  .chips-label {
    color: var(--muted); font-size:10.5px; font-weight:600;
    letter-spacing:.1em; text-transform:uppercase;
  }
  .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip {
    display:inline-flex; align-items:center; gap:5px;
    padding: 5px 10px; border-radius: 999px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.10);
    color: #d8d8e0; font-size: 11.5px; font-weight: 500;
    cursor: pointer; user-select:none;
    transition: background .2s ease, border-color .2s ease, color .2s ease, transform .15s ease;
  }
  .chip::before {
    content:"+"; color: var(--gold); font-weight: 700; font-size: 13px; line-height:1;
    transition: transform .2s ease;
  }
  .chip:hover { border-color: rgba(197,161,74,.45); color:#fff; }
  .chip.on {
    background: rgba(197,161,74,.14); border-color: var(--gold); color: #fff;
  }
  .chip.on::before { content:"✓"; transform: scale(1); font-size:11px; }
  .chip .delta { color: var(--gold); font-weight: 600; font-size: 11px; }

  .cta-row {
    margin-top: auto; display:flex; gap:8px; align-items:center;
  }
  .cta {
    flex:1; display:inline-flex; align-items:center; justify-content:center;
    padding: 11px 14px; border-radius: 999px; border:none; cursor:pointer;
    font-family: inherit; font-weight: 600; font-size: 13px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #141410; box-shadow: 0 6px 18px rgba(197,161,74,.32);
    transition: transform .2s ease, box-shadow .25s ease;
  }
  .cta:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(197,161,74,.45); }
  .cta-secondary {
    background: transparent; color: var(--gold);
    border: 1px solid rgba(197,161,74,.4); box-shadow:none;
    flex: 0 0 auto; padding: 11px 14px;
  }
  .cta-secondary:hover { background: rgba(197,161,74,.08); box-shadow:none; }

  .footnote { font-size: 10.5px; color: var(--muted); margin: 0; line-height:1.5; }
</style>
</head>
<body>

<div class="calc">
  <!-- ── LEFT VISUAL ─────────────────────────────────── -->
  <div class="visual">
    <div class="visual-head">
      <span class="eyebrow">Load Estimator</span>
      <span class="live-pill">Live price</span>
    </div>

    <div class="truck-stage">
      <!-- Floating boxes that fade in based on load -->
      <div class="float-box" id="fb1" style="left: 18%; top: 35%;"></div>
      <div class="float-box" id="fb2" style="left: 32%; top: 22%;"></div>
      <div class="float-box" id="fb3" style="left: 46%; top: 30%;"></div>

      <div class="truck">
        <svg viewBox="0 0 380 200" width="100%" height="100%" preserveAspectRatio="xMidYMax meet">
          <defs>
            <!-- Bed body: deep black with subtle gold sheen down the side -->
            <linearGradient id="bedGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"  stop-color="#1c1c20"/>
              <stop offset="60%" stop-color="#101012"/>
              <stop offset="100%" stop-color="#070708"/>
            </linearGradient>
            <!-- Cab body -->
            <linearGradient id="cabGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"  stop-color="#181819"/>
              <stop offset="100%" stop-color="#0a0a0b"/>
            </linearGradient>
            <!-- Window glass -->
            <linearGradient id="glassGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"  stop-color="#e0bf6f" stop-opacity=".55"/>
              <stop offset="100%" stop-color="#a98735" stop-opacity=".18"/>
            </linearGradient>
            <!-- Headlight glow -->
            <radialGradient id="headlight" cx=".4" cy=".5" r=".6">
              <stop offset="0%"  stop-color="#fff6d4"/>
              <stop offset="40%" stop-color="#e0bf6f"/>
              <stop offset="100%" stop-color="#a98735" stop-opacity="0"/>
            </radialGradient>
            <!-- Wheel rim -->
            <radialGradient id="rim" cx=".4" cy=".4" r=".6">
              <stop offset="0%"  stop-color="#e0bf6f"/>
              <stop offset="55%" stop-color="#a98735"/>
              <stop offset="100%" stop-color="#5b461c"/>
            </radialGradient>
            <!-- Tire highlight -->
            <radialGradient id="tire" cx=".4" cy=".35" r=".75">
              <stop offset="0%"  stop-color="#1c1c20"/>
              <stop offset="100%" stop-color="#050506"/>
            </radialGradient>
          </defs>

          <!-- Ground shadow -->
          <ellipse cx="190" cy="172" rx="160" ry="6" fill="#000" opacity=".55"/>

          <!-- ─── TIPPER BED (angled, dump-truck silhouette echoing the logo) ─── -->
          <!-- Front wall (cab-side) is slightly taller; rear wall slopes down -->
          <path d="M22 38
                   L242 38
                   L252 28           
                   L252 142
                   L22 142
                   Z"
                fill="url(#bedGrad)" stroke="#c5a14a" stroke-width="1.6"/>
          <!-- Top gold rim line -->
          <path d="M22 38 L242 38 L252 28" fill="none" stroke="#e0bf6f" stroke-width="2" stroke-linecap="round"/>
          <!-- Side panel seams -->
          <line x1="90"  y1="50" x2="90"  y2="138" stroke="#2a2a2e" stroke-width="1"/>
          <line x1="170" y1="50" x2="170" y2="138" stroke="#2a2a2e" stroke-width="1"/>
          <!-- Gold pin-stripe along the lower edge — a subtle luxury detail -->
          <line x1="24" y1="132" x2="250" y2="132" stroke="#c5a14a" stroke-width=".75" opacity=".6"/>
          <!-- Tail panel hinge dots -->
          <circle cx="30"  cy="60"  r="1.4" fill="#c5a14a" opacity=".75"/>
          <circle cx="30"  cy="120" r="1.4" fill="#c5a14a" opacity=".75"/>

          <!-- ─── CAB + HOOD (single continuous silhouette) ─── -->
          <!--
               roof  windshield slope    hood top   hood front
            256 58 — 290 58 — 308 88 —— 322 88 —— 332 128
                                                          │
               cab back  bumper top                       bumper
               256 140 —————————————— 332 140
          -->
          <path d="M256 58 L290 58 L308 88 L322 88 L332 128 L332 140 L256 140 Z"
                fill="url(#cabGrad)" stroke="#c5a14a" stroke-width="1.6" stroke-linejoin="round"/>

          <!-- Roof gold ridge -->
          <line x1="256" y1="58" x2="290" y2="58" stroke="#e0bf6f" stroke-width="1.6" stroke-linecap="round"/>
          <!-- Hood top highlight (separating hood from cab profile) -->
          <line x1="308" y1="88" x2="322" y2="88" stroke="#c5a14a" stroke-width="1" opacity=".85"/>
          <!-- Hood-to-cab seam (vertical line where hood meets cab body) -->
          <line x1="296" y1="96" x2="296" y2="140" stroke="#c5a14a" stroke-width=".8" opacity=".55"/>

          <!-- Windshield glass (filling the slope between roof and hood) -->
          <path d="M262 64 L286 64 L302 86 L262 86 Z" fill="url(#glassGrad)"/>
          <!-- Windshield highlight (single white streak) -->
          <path d="M264 66 L272 66 L266 84 L262 84 Z" fill="#fff" opacity=".18"/>
          <!-- Windshield wiper -->
          <line x1="274" y1="84" x2="284" y2="66" stroke="#2a2a2e" stroke-width=".9"/>

          <!-- Door seam + handle (cab side door behind the hood) -->
          <path d="M264 92 L294 92 L294 138 L264 138 Z" fill="none" stroke="#1f1f23" stroke-width=".8"/>
          <rect x="278" y="112" width="10" height="2" rx="1" fill="#c5a14a" opacity=".75"/>
          <!-- Door step -->
          <rect x="262" y="140" width="34" height="2" fill="#0a0a0c"/>

          <!-- Side mirror (attached to cab roof, slightly forward) -->
          <line x1="294" y1="66" x2="302" y2="60" stroke="#c5a14a" stroke-width=".8"/>
          <rect x="300" y="58" width="6" height="10" rx="1.5" fill="#1a1a1e" stroke="#c5a14a" stroke-width=".8"/>

          <!-- Front grille slats on the slanted hood-front face -->
          <g stroke="#c5a14a" stroke-linecap="round">
            <line x1="322" y1="100" x2="330" y2="118" stroke-width=".7" opacity=".55"/>
            <line x1="322" y1="108" x2="331" y2="123" stroke-width=".7" opacity=".55"/>
            <line x1="322" y1="116" x2="331" y2="128" stroke-width=".7" opacity=".55"/>
          </g>

          <!-- Headlight on the hood front — with glow -->
          <ellipse cx="326" cy="95" rx="5" ry="3.5"
                   fill="url(#headlight)" transform="rotate(20 326 95)"/>
          <ellipse cx="326" cy="95" rx="2.5" ry="1.8" fill="#fff6d4"
                   transform="rotate(20 326 95)"/>

          <!-- Front bumper (extends just past the hood front) -->
          <path d="M324 132 L338 132 L338 142 L324 142 Z"
                fill="#1a1a1e" stroke="#c5a14a" stroke-width=".8"/>
          <line x1="326" y1="137" x2="336" y2="137" stroke="#c5a14a" stroke-width=".6" opacity=".5"/>

          <!-- Exhaust stack rising behind the cab -->
          <rect x="248" y="32" width="5" height="30" rx="1" fill="#0a0a0c" stroke="#c5a14a" stroke-width=".8"/>
          <rect x="247" y="30" width="7" height="3" rx="1" fill="#1a1a1e" stroke="#c5a14a" stroke-width=".8"/>

          <!-- ─── CHASSIS ─── -->
          <rect x="18" y="142" width="320" height="6" fill="#050506"/>
          <line x1="20" y1="143" x2="336" y2="143" stroke="#c5a14a" stroke-width=".6" opacity=".4"/>

          <!-- ─── WHEELS ─── -->
          <g>
            <!-- rear axle (two close wheels = dump-truck cue) -->
            <circle cx="68"  cy="160" r="15" fill="url(#tire)"/>
            <circle cx="68"  cy="160" r="9"  fill="url(#rim)"/>
            <circle cx="68"  cy="160" r="2.5" fill="#1a1a1e"/>
            <g stroke="#1a1a1e" stroke-width="1.4">
              <line x1="68" y1="152" x2="68" y2="168"/>
              <line x1="60" y1="160" x2="76" y2="160"/>
            </g>

            <circle cx="104" cy="160" r="15" fill="url(#tire)"/>
            <circle cx="104" cy="160" r="9"  fill="url(#rim)"/>
            <circle cx="104" cy="160" r="2.5" fill="#1a1a1e"/>
            <g stroke="#1a1a1e" stroke-width="1.4">
              <line x1="104" y1="152" x2="104" y2="168"/>
              <line x1="96"  y1="160" x2="112" y2="160"/>
            </g>

            <!-- front -->
            <circle cx="300" cy="160" r="15" fill="url(#tire)"/>
            <circle cx="300" cy="160" r="9"  fill="url(#rim)"/>
            <circle cx="300" cy="160" r="2.5" fill="#1a1a1e"/>
            <g stroke="#1a1a1e" stroke-width="1.4">
              <line x1="300" y1="152" x2="300" y2="168"/>
              <line x1="292" y1="160" x2="308" y2="160"/>
            </g>
          </g>

          <!-- Large gold monogram "L" inside the bed — sits behind the junk pile -->
          <g transform="translate(118, 56)" opacity=".55">
            <text x="0" y="58" fill="#c5a14a"
                  font-family="'Playfair Display', serif" font-weight="800"
                  font-size="68" letter-spacing="-2">L</text>
            <path d="M-6 67 Q 22 72 42 64" stroke="#c5a14a" stroke-width="1.6"
                  fill="none" stroke-linecap="round" opacity=".75"/>
          </g>
        </svg>

        <!-- Junk pile, clipped to the bed -->
        <div class="bed-clip">
          <div class="junk-pile" id="pile"></div>
        </div>
      </div>
    </div>

    <div class="ticks" role="tablist" aria-label="Load size">
      <button class="tick" data-i="0">Single<small>1 item</small></button>
      <button class="tick" data-i="1">Small<small>1/4 load</small></button>
      <button class="tick active" data-i="2">Medium<small>1/2 load</small></button>
      <button class="tick" data-i="3">Large<small>3/4 load</small></button>
      <button class="tick" data-i="4">Full Truck<small>20 yd³</small></button>
    </div>
  </div>

  <!-- ── RIGHT PANEL ─────────────────────────────────── -->
  <div class="panel">
    <div class="price-block">
      <h3 class="tier-name" id="tierName">Medium Load</h3>
      <p class="tier-for" id="tierFor">Best for a partial room or a couch plus a few extras.</p>
      <div class="price-row">
        <div class="price"><span class="currency">$</span><span class="digits" id="digits">289</span></div>
        <span class="price-suffix">starting · all-in</span>
      </div>
    </div>

    <div>
      <p class="chips-label" style="margin: 0 0 8px;">Add tricky items</p>
      <div class="chips">
        <button class="chip" data-add="35">Mattress <span class="delta">+$35</span></button>
        <button class="chip" data-add="45">Fridge <span class="delta">+$45</span></button>
        <button class="chip" data-add="20">TV <span class="delta">+$20</span></button>
        <button class="chip" data-add="55">Hot tub <span class="delta">+$55</span></button>
        <button class="chip" data-add="25">Stairs <span class="delta">+$25</span></button>
      </div>
    </div>

    <div class="cta-row">
      <button class="cta">Lock in this quote</button>
      <button class="cta cta-secondary" title="Text the truck">Text photo</button>
    </div>

    <p class="footnote">Final price is confirmed on-site before any work begins. No hidden fees, ever.</p>
  </div>
</div>

<script>
  const TIERS = [
    { name: "Single Item",  for: "One piece — couch, mattress, fridge, mower.",     price:  89, pile:  14 },
    { name: "Small Load",   for: "A handful of items or a closet's worth of stuff.", price: 179, pile:  38 },
    { name: "Medium Load",  for: "Partial room or a couch plus a few extras.",       price: 289, pile:  65 },
    { name: "Large Load",   for: "A garage or full bedroom cleared in one go.",      price: 429, pile:  92 },
    { name: "Full Truck",   for: "Estate, large reno debris, or a complete cleanout.",price: 589, pile: 118 }
  ];
  const FLOATS = [
    [],          // 0
    ["fb1"],     // 1
    ["fb1","fb2"], // 2
    ["fb1","fb2","fb3"], // 3
    ["fb1","fb2","fb3"]
  ];

  let current = 2;
  let added = 0;

  /* ── Price swap animation (rise + blur fade) ─────── */
  const digitsEl = document.getElementById("digits");
  let priceTimer = null;
  function renderPrice(value, animate = true) {
    if (!animate) { digitsEl.textContent = value; return; }
    if (digitsEl.textContent === String(value)) return;
    digitsEl.classList.add("swap");
    clearTimeout(priceTimer);
    priceTimer = setTimeout(() => {
      digitsEl.textContent = value;
      digitsEl.classList.remove("swap");
    }, 260);
  }

  /* ── Render the whole state ──────────────────────── */
  function render(initial=false) {
    const t = TIERS[current];
    document.getElementById("tierName").textContent = t.name;
    document.getElementById("tierFor").textContent  = t.for;
    renderPrice(t.price + added, !initial);
    document.getElementById("pile").style.height = t.pile + "%";

    // float boxes
    ["fb1","fb2","fb3"].forEach((id, idx) => {
      const el = document.getElementById(id);
      const on = FLOATS[current].includes(id);
      el.style.opacity = on ? ".9" : "0";
      el.style.transform = on ? "translateY(0)" : "translateY(8px)";
      el.style.transitionDelay = on ? (idx * 0.08) + "s" : "0s";
    });

    // ticks
    document.querySelectorAll(".tick").forEach(b => {
      b.classList.toggle("active", Number(b.dataset.i) === current);
    });
  }
  render(true);

  document.querySelectorAll(".tick").forEach(b => {
    b.addEventListener("click", () => {
      current = Number(b.dataset.i);
      render();
    });
  });

  document.querySelectorAll(".chip").forEach(c => {
    c.addEventListener("click", () => {
      const v = Number(c.dataset.add);
      const on = c.classList.toggle("on");
      added += on ? v : -v;
      render();
    });
  });

  // Auto-cycle demo so the card shows life in the gallery
  let demo = 2;
  let demoTimer = setInterval(() => {
    demo = (demo + 1) % TIERS.length;
    current = demo;
    render();
  }, 2600);
  // Stop the auto-demo as soon as the user interacts
  ["click","touchstart","mousemove"].forEach(ev =>
    document.addEventListener(ev, () => { clearInterval(demoTimer); demoTimer = null; }, { once:true })
  );
</script>
