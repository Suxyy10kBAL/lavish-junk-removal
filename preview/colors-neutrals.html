<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fafafa; font-family: var(--font-sans); }
  .card { background: #fff; border-radius: 16px; padding: 24px; }
  .row { display:flex; gap:10px; }
  .sw { flex:1; aspect-ratio:1; border-radius:10px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .name { font-weight:700; font-size:11px; }
  .hex { font-size:10px; opacity:.7; font-family:ui-monospace,Menlo,monospace; }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="sw" style="background:#ffffff; color:#18181b; border:1px solid #e5e7eb;"><div class="name">Surface</div><div class="hex">#FFFFFF</div></div>
    <div class="sw" style="background:#f8f8f9; color:#18181b; border:1px solid #e5e7eb;"><div class="name">Surface Off</div><div class="hex">#F8F8F9</div></div>
    <div class="sw" style="background:#e5e7eb; color:#18181b;"><div class="name">Border</div><div class="hex">#E5E7EB</div></div>
    <div class="sw" style="background:#a1a1aa; color:#fff;"><div class="name">Muted</div><div class="hex">#A1A1AA</div></div>
    <div class="sw" style="background:#52525b; color:#fff;"><div class="name">Text Dim</div><div class="hex">#52525B</div></div>
    <div class="sw" style="background:#18181b; color:#fff;"><div class="name">Text</div><div class="hex">#18181B</div></div>
  </div>
</div>
</body>
</html>
