<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 24px; background: #fafafa; font-family: Inter,sans-serif; }
  .card { background: #fff; border-radius: 16px; padding: 28px; display:flex; gap:24px; align-items:flex-end; }
  .col { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .swatch { background: #1a1a1e; border:1px solid rgba(255,255,255,.10); }
  .name { font-size:12px; font-weight:600; color:#18181b; }
  .px { font-family:ui-monospace,Menlo,monospace; font-size:11px; color:#888; }
</style>
</head>
<body>
<div class="card">
  <div class="col"><div class="swatch" style="width:60px;height:60px;border-radius:6px;"></div><div class="name">xs</div><div class="px">6px</div></div>
  <div class="col"><div class="swatch" style="width:80px;height:80px;border-radius:10px;"></div><div class="name">sm</div><div class="px">10px</div></div>
  <div class="col"><div class="swatch" style="width:100px;height:100px;border-radius:14px;"></div><div class="name">default</div><div class="px">14px</div></div>
  <div class="col"><div class="swatch" style="width:80px;height:40px;border-radius:999px;"></div><div class="name">pill</div><div class="px">999px</div></div>
</div>
</body>
</html>
