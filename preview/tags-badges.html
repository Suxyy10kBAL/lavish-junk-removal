<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 24px; background: #0f0f10; font-family: Inter,sans-serif; }
  .card { background: #141416; border-radius: 16px; padding: 24px; display:flex; flex-direction:column; gap:14px; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .tag { background:#fff; border:1px solid #e5e7eb; border-radius:999px; padding:.5rem 1rem; font-size:.9rem; color:#18181b; }
  .tag-primary { background:rgba(197,161,74,.08); border-color:rgba(197,161,74,.45); color:#a98735; font-weight:600; }
  .badge-eyebrow { color:#c5a14a; font-size:.74rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; background:rgba(197,161,74,.12); border:1px solid rgba(197,161,74,.35); border-radius:999px; padding:.2rem .75rem; }
  .badge-featured { background:#c5a14a; color:#111; border-color:#c5a14a; }
  .trust { display:inline-flex; align-items:center; gap:.5rem; background:rgba(255,255,255,.05); border:1px solid rgba(197,161,74,.35); border-radius:10px; padding:.55rem .85rem; font-size:.85rem; color:#f2f2f2; font-weight:500; }
  .trust svg { color:#c5a14a; width:16px; height:16px; }
  .label { font-size:11px; color:#888; font-family:ui-monospace,Menlo,monospace; }
</style>
</head>
<body>
<div class="card">
  <div class="label">.area-tag / .item-tag</div>
  <div class="row">
    <span class="tag tag-primary">North Vancouver</span>
    <span class="tag tag-primary">Vancouver</span>
    <span class="tag">Burnaby</span>
    <span class="tag">Coquitlam</span>
    <span class="tag">Mattresses</span>
    <span class="tag">Hot Tubs</span>
  </div>
  <div class="label" style="margin-top:6px;">.pricing-card-badge / .trust-badge</div>
  <div class="row">
    <span class="badge-eyebrow">Small</span>
    <span class="badge-eyebrow badge-featured">Most Popular</span>
    <div class="trust"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Free Estimates</div>
    <div class="trust"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Same-Day</div>
  </div>
</div>
</body>
</html>
