<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root { --gold:#c5a14a; --gold-deep:#a98735; --gold-light:#e0bf6f; }
  body { margin: 0; padding: 22px; background: #0f0f10; font-family: Inter,sans-serif; color:#f2f2f2; }
  .card { background:#141416; border-radius:16px; padding:22px 24px; display:grid; grid-template-columns: 1fr 1fr 1fr; gap:22px; align-items:stretch; }
  .demo { display:flex; flex-direction:column; align-items:center; justify-content:space-between; gap:10px; padding:6px 0; }
  .label { font-size:10px; color:#888; font-family:ui-monospace,Menlo,monospace; text-align:center; letter-spacing:.04em; }
  .label strong { color:#c5a14a; font-weight:600; letter-spacing:.08em; text-transform:uppercase; font-size:9.5px; display:block; margin-bottom:2px; }

  /* ── 1. Gold shine sweep ── */
  .shine-btn {
    position: relative;
    display:inline-flex; align-items:center; justify-content:center;
    padding:.85rem 1.7rem; border-radius:999px; border:none; cursor:pointer;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    color:#141410; font-family:inherit; font-weight:600; font-size:.95rem;
    box-shadow: 0 6px 18px rgba(197,161,74,.32);
    overflow: hidden; isolation: isolate;
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .shine-btn::before {
    content:""; position:absolute; top:0; left:-60%; width:40%; height:100%;
    background: linear-gradient(115deg, transparent 0%, rgba(255,255,255,.55) 50%, transparent 100%);
    transform: skewX(-18deg); transition: left .85s cubic-bezier(.22,.61,.36,1);
    z-index: -1;
  }
  .shine-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 26px rgba(197,161,74,.5); }
  .shine-btn:hover::before { left: 120%; }

  /* ── 2. Service card — gold spine grows into glow ── */
  .spine-card {
    position: relative;
    width: 200px; min-height: 110px;
    background:#fff; color:#18181b;
    border:1px solid #e5e7eb; border-radius:14px;
    padding: 16px 16px 16px 22px; overflow:hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    transition: transform .35s cubic-bezier(.22,.61,.36,1), box-shadow .35s ease, color .25s ease;
    cursor:pointer;
  }
  .spine-card::before {
    content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
    background: var(--gold);
    transition: width .45s cubic-bezier(.22,.61,.36,1);
  }
  .spine-card::after {
    content:""; position:absolute; inset:0;
    background: radial-gradient(circle at 0% 50%, rgba(197,161,74,.18) 0%, transparent 55%);
    opacity:0; transition: opacity .4s ease;
    pointer-events:none;
  }
  .spine-card:hover { transform: translateY(-4px); box-shadow: 0 16px 36px rgba(0,0,0,.12); }
  .spine-card:hover::before { width: 100%; opacity:.18; }
  .spine-card:hover::after  { opacity: 1; }
  .spine-card h3 { margin:0 0 4px; font-size:.95rem; font-weight:700; position:relative; z-index:1; }
  .spine-card p  { margin:0; font-size:.78rem; color:#52525b; line-height:1.5; position:relative; z-index:1; }
  .spine-icon {
    width: 28px; height: 28px; color: var(--gold); margin-bottom: 8px;
    transition: transform .5s cubic-bezier(.22,.61,.36,1);
    position:relative; z-index:1;
  }
  .spine-card:hover .spine-icon { transform: rotate(-6deg) scale(1.08); }

  /* ── 3. "Haul away" microinteraction ── */
  .haul-stage {
    position: relative; width: 100%; height: 110px;
    background: rgba(255,255,255,.03);
    border:1px solid rgba(197,161,74,.18);
    border-radius:12px; overflow:hidden; cursor:pointer;
  }
  .haul-rule {
    position:absolute; left:0; right:0; bottom:24px; height:1px;
    background: linear-gradient(90deg, transparent, rgba(197,161,74,.4), transparent);
  }
  .junk {
    position:absolute; bottom:24px; left:42%;
    width: 28px; height: 22px; border-radius:3px;
    background: linear-gradient(135deg,#3a3a44,#26262c);
    box-shadow: 32px -4px 0 -2px #2c2c34, 16px -10px 0 -4px #34343c;
    transition: transform .9s cubic-bezier(.55,0,.2,1), opacity .6s ease .35s;
  }
  .truck {
    position:absolute; bottom:18px; left: -30%;
    color: var(--gold); transition: left .9s cubic-bezier(.55,0,.2,1);
    filter: drop-shadow(0 4px 8px rgba(197,161,74,.25));
  }
  .haul-stage:hover .junk  { transform: translateX(140px) translateY(-4px) rotate(8deg); opacity:0; }
  .haul-stage:hover .truck { left: 60%; }

  .heading { grid-column: 1 / -1; display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 2px; }
  .heading h4 { margin:0; font-family:"Playfair Display",serif; font-size:1.1rem; font-weight:700; color:#fff; }
  .heading span { font-size:10px; color:#666; font-family:ui-monospace,Menlo,monospace; }
</style>
</head>
<body>
<div class="card">
  <div class="heading"><h4>Signature interactions</h4><span>hover to play</span></div>

  <div class="demo">
    <button class="shine-btn">Get Free Estimate</button>
    <div class="label"><strong>Gold sweep</strong>diagonal sheen · 0.85s cubic-bezier</div>
  </div>

  <div class="demo">
    <div class="spine-card">
      <svg class="spine-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <h3>Residential</h3>
      <p>Spine grows; warm gold halo enters from the left.</p>
    </div>
    <div class="label"><strong>Spine bloom</strong>3px → full halo · 0.45s ease-out</div>
  </div>

  <div class="demo">
    <div class="haul-stage" aria-label="Junk hauled away on hover">
      <div class="haul-rule"></div>
      <div class="junk"></div>
      <svg class="truck" width="56" height="40" viewBox="0 0 56 40" fill="none">
        <rect x="4"  y="10" width="26" height="18" rx="2" fill="currentColor" opacity=".95"/>
        <path d="M30 14 H46 L52 22 V28 H30 Z" fill="currentColor"/>
        <circle cx="14" cy="32" r="4" fill="#0f0f10" stroke="currentColor" stroke-width="2"/>
        <circle cx="42" cy="32" r="4" fill="#0f0f10" stroke="currentColor" stroke-width="2"/>
      </svg>
    </div>
    <div class="label"><strong>Haul-away</strong>brand-themed reveal · only on key surfaces</div>
  </div>
</div>
</body>
</html>
