<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  body { margin: 0; padding: 0; background: #0f0f10; font-family: Inter,sans-serif; color:#f2f2f2; }
  .hero { padding: 36px 32px 32px; position:relative; overflow:hidden; }
  .hero::before { content:""; position:absolute; inset:0; background: radial-gradient(ellipse 65% 70% at 70% 50%, rgba(197,161,74,.07) 0%, transparent 65%); pointer-events:none; }
  .eyebrow { display:inline-flex; align-items:center; gap:.5rem; color:#c5a14a; font-size:.72rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; margin-bottom:.8rem; }
  .eyebrow::before { content:""; display:block; width:24px; height:2px; background:#c5a14a; border-radius:1px; }
  h1 { font-family:"Playfair Display",serif; font-weight:800; font-size:34px; line-height:1.1; margin:0 0 .8rem; color:#fff; max-width:520px; }
  .sub { color:#c0c0c8; max-width:48ch; margin:0 0 1.1rem; font-size:.92rem; line-height:1.65; }
  .actions { display:flex; gap:.6rem; }
  .btn { display:inline-flex; align-items:center; padding:.7rem 1.2rem; border-radius:999px; font-weight:600; font-size:.85rem; cursor:pointer; }
  .gold { background:linear-gradient(135deg,#c5a14a,#e0bf6f); color:#141410; box-shadow:0 6px 18px rgba(197,161,74,.32); border:none; }
  .outline { border:1.5px solid rgba(255,255,255,.42); color:#f2f2f2; background:transparent; }
</style>
</head>
<body>
<div class="hero">
  <p class="eyebrow">Serving the Lower Mainland</p>
  <h1>Fast, Professional Junk Removal Made Simple</h1>
  <p class="sub">Lavish Junk Removal helps homeowners, renters, and businesses clear unwanted junk quickly, safely, and stress-free — with upfront pricing and no hidden fees.</p>
  <div class="actions">
    <button class="btn gold">Get Free Estimate</button>
    <button class="btn outline">Call Now</button>
  </div>
</div>
</body>
</html>
