<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 24px; background:#fafafa; font-family: Inter,sans-serif; }
  .card { background:#fff; border-radius:16px; padding:24px 28px; display:flex; gap:18px; align-items:flex-end; }
  .col { display:flex; flex-direction:column; gap:8px; align-items:center; }
  .bar { background:#c5a14a; border-radius:4px; }
  .px { font-family:ui-monospace,Menlo,monospace; font-size:11px; color:#666; }
  .label { font-size:12px; color:#18181b; font-weight:600; }
</style>
</head>
<body>
<div class="card">
  <div class="col"><div class="bar" style="width:8px; height:8px;"></div><div class="label">8</div><div class="px">.5rem</div></div>
  <div class="col"><div class="bar" style="width:8px; height:16px;"></div><div class="label">16</div><div class="px">1rem</div></div>
  <div class="col"><div class="bar" style="width:8px; height:24px;"></div><div class="label">24</div><div class="px">1.5rem</div></div>
  <div class="col"><div class="bar" style="width:8px; height:40px;"></div><div class="label">40</div><div class="px">2.5rem</div></div>
  <div class="col"><div class="bar" style="width:8px; height:64px;"></div><div class="label">64</div><div class="px">4rem</div></div>
  <div class="col"><div class="bar" style="width:8px; height:88px;"></div><div class="label">88</div><div class="px">5.5rem · section pad</div></div>
</div>
</body>
</html>
