<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 28px; background: #fafafa; font-family: Inter,sans-serif; }
  .card { background: #fff; border-radius: 16px; padding: 32px 28px; display:flex; gap:28px; }
  .demo { width:140px; }
  .box { width:140px; height:80px; border-radius:14px; background:#fff; border:1px solid #f0f0f0; }
  .label { margin-top:14px; font-size:12px; font-weight:600; }
  .px { font-family:ui-monospace,Menlo,monospace; font-size:10px; color:#888; }
  .b1 { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .b2 { box-shadow: 0 8px 24px rgba(0,0,0,.08); }
  .b3 { box-shadow: 0 20px 48px rgba(0,0,0,.13); }
  .b4 { box-shadow: 0 6px 18px rgba(197,161,74,.32); background: linear-gradient(135deg,#c5a14a,#e0bf6f); border:none; }
</style>
</head>
<body>
<div class="card">
  <div class="demo"><div class="box b1"></div><div class="label">shadow-sm</div><div class="px">0 2 8 / 6%</div></div>
  <div class="demo"><div class="box b2"></div><div class="label">shadow</div><div class="px">0 8 24 / 8%</div></div>
  <div class="demo"><div class="box b3"></div><div class="label">shadow-lg</div><div class="px">0 20 48 / 13%</div></div>
  <div class="demo"><div class="box b4"></div><div class="label">shadow-gold</div><div class="px">0 6 18 / gold 32%</div></div>
</div>
</body>
</html>
