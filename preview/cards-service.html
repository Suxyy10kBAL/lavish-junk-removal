<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 24px; background: #fafafa; font-family: Inter,sans-serif; }
  .wrap { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
  .service-card { background:#fff; border:1px solid #e5e7eb; border-left:3px solid #c5a14a; border-radius:14px; padding:20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .icon { width:32px; height:32px; color:#c5a14a; margin-bottom:10px; }
  h3 { margin:0 0 4px; font-size:1rem; font-weight:700; color:#18181b; }
  p { margin:0; font-size:.85rem; color:#52525b; line-height:1.55; }
  .why-card { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:18px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .why-icon { width:38px; height:38px; border-radius:10px; background:rgba(197,161,74,.1); border:1px solid rgba(197,161,74,.25); display:grid; place-items:center; color:#c5a14a; margin-bottom:10px; }
  .why-icon svg { width:18px; height:18px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="service-card">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <h3>Residential Junk Removal</h3>
    <p>Clear rooms, basements and garages — same-day available.</p>
  </div>
  <div class="why-card">
    <div class="why-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
    <h3>Upfront Pricing</h3>
    <p>Final price confirmed before work starts. What we quote is what you pay.</p>
  </div>
</div>
</body>
</html>
