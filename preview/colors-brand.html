<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fafafa; font-family: var(--font-sans); }
  .card { background: #fff; border-radius: 16px; padding: 24px; }
</style>
</head>
<body>
<div class="card">
  <div style="display:flex; gap:14px; align-items:stretch;">
    <div style="flex:1; aspect-ratio:1; border-radius:12px; background:#c5a14a; display:flex; align-items:flex-end; padding:10px; color:#141410;">
      <div>
        <div style="font-weight:700; font-size:13px;">Gold</div>
        <div style="font-size:11px; opacity:.7; font-family:ui-monospace,Menlo,monospace;">#C5A14A</div>
      </div>
    </div>
    <div style="flex:1; aspect-ratio:1; border-radius:12px; background:#a98735; display:flex; align-items:flex-end; padding:10px; color:#fff;">
      <div>
        <div style="font-weight:700; font-size:13px;">Gold Deep</div>
        <div style="font-size:11px; opacity:.75; font-family:ui-monospace,Menlo,monospace;">#A98735</div>
      </div>
    </div>
    <div style="flex:1; aspect-ratio:1; border-radius:12px; background:#e0bf6f; display:flex; align-items:flex-end; padding:10px; color:#141410;">
      <div>
        <div style="font-weight:700; font-size:13px;">Gold Light</div>
        <div style="font-size:11px; opacity:.65; font-family:ui-monospace,Menlo,monospace;">#E0BF6F</div>
      </div>
    </div>
    <div style="flex:1; aspect-ratio:1; border-radius:12px; background:#0f0f10; display:flex; align-items:flex-end; padding:10px; color:#fff;">
      <div>
        <div style="font-weight:700; font-size:13px;">Bg</div>
        <div style="font-size:11px; opacity:.55; font-family:ui-monospace,Menlo,monospace;">#0F0F10</div>
      </div>
    </div>
    <div style="flex:1; aspect-ratio:1; border-radius:12px; background:#1a1a1e; display:flex; align-items:flex-end; padding:10px; color:#fff;">
      <div>
        <div style="font-weight:700; font-size:13px;">Bg Card</div>
        <div style="font-size:11px; opacity:.55; font-family:ui-monospace,Menlo,monospace;">#1A1A1E</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
