<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 24px; background: #fafafa; font-family: Inter,sans-serif; }
  .review { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); display:flex; flex-direction:column; gap:8px; max-width:520px; }
  .stars { color:#c5a14a; font-size:1.05rem; letter-spacing:.08em; margin:0; }
  .text { font-size:.95rem; color:#52525b; line-height:1.65; margin:0; }
  .author { font-size:.85rem; font-weight:600; color:#18181b; display:flex; align-items:center; gap:.5rem; margin:0; }
  .avatar { width:24px; height:24px; border-radius:50%; background: linear-gradient(135deg,#c5a14a,#a98735); }
</style>
</head>
<body>
<div class="review">
  <p class="stars">★★★★★</p>
  <p class="text">"Fast, professional, and easy to work with. Had a couch and some boxes removed the same day I called. Will definitely use again."</p>
  <p class="author"><span class="avatar"></span>Sarah M. — North Vancouver</p>
</div>
</body>
</html>
